<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  
  <style type= "text/css">

  
  
        /* Mengatur agar seluruh isi halaman berada di tengah */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: blue;
            font-family: Arial, sans-serif;
        }

        /* Mengatur ukuran dan tampilan kotak formulir */
        .container {
            background-color: pink;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px; /* Membuat form lebih lebar */
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        /* Mengatur agar input memenuhi lebar kotak */
        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0 20px 0;
            display: inline-block;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box; /* Agar padding tidak merusak lebar */
            font-size: 16px;
        }

        /* Membuat tombol lebih besar dan menarik */
        button {
            width: 100%;
            background-color: #4CAF50;
            color: white;
            padding: 14px 20px;
            margin: 8px 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }

        button:hover {
            background-color: #45a049;
        }

        .gender-group {
            margin-bottom: 20px;
        }
        
        
    </style>
    
    
    <link rel="stylesheet" href="style.css">
  
  
</head>
